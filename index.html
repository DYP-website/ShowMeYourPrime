<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fbff" />
  <title>Show Me Your Prime Another Time</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">P</div>
        <div><strong>ShowMeYourPrime</strong><span>Another Time</span></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <button class="ghost small" id="exportBtn">Backup dati</button>
        <label class="ghost small file-label">Importa<input id="importFile" type="file" accept="application/json" hidden></label>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn mobile-only" id="menuBtn">☰</button>
        <div>
          <p class="date-line" id="dateLine"></p>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="top-actions">
          <button class="ghost" id="themeBtn">Tema</button>
          <button class="primary" data-action="quickMeal">+ Pasto</button>
        </div>
      </header>

      <section id="dashboard" class="view active"></section>
      <section id="profile" class="view"></section>
      <section id="diary" class="view"></section>
      <section id="recipes" class="view"></section>
      <section id="calendar" class="view"></section>
      <section id="progress" class="view"></section>
      <section id="settings" class="view"></section>
    </main>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-card">
      <button class="icon-btn close" id="modalClose">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <button class="meal-fab" data-action="quickMeal" aria-label="Aggiungi pasto">+</button>

  <div class="toast" id="toast"></div>

  <script src="storage.js"></script>
  <script src="foods.js"></script>
  <script src="utils.js"></script>
  <script src="charts.js"></script>
  <script src="profile.js"></script>
  <script src="dashboard.js"></script>
  <script src="diary.js"></script>
  <script src="recipes.js"></script>
  <script src="calendar.js"></script>
  <script src="progress.js"></script>
  <script src="settings.js"></script>
  <script src="script.js"></script>
</body>
</html>
